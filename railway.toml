# SavdoAI Mashrab Moliya v23.1 — Railway
# 3 ta servis: savdoai-api, savdoai-bot, savdoai-worker

[build]
builder = "DOCKERFILE"

[[services]]
name = "savdoai-api"
[services.build]
dockerfilePath = "services/api/Dockerfile"
[services.deploy]
startCommand = "sh -c 'cd /app/services/api && python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1'"
healthCheckPath = "/health"
restartPolicyType = "ON_FAILURE"
[services.variables]
DATABASE_URL = "${{Postgres.DATABASE_URL}}"
REDIS_URL    = "${{Redis.REDIS_URL}}"
JWT_SECRET   = "${{JWT_SECRET}}"
DB_MIN       = "2"
DB_MAX       = "10"
PYTHONPATH   = "/app"

[[services]]
name = "savdoai-bot"
[services.build]
dockerfilePath = "services/bot/Dockerfile"
[services.deploy]
startCommand = "sh -c 'cd /app/services/bot && python main.py'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
[services.variables]
BOT_TOKEN         = "${{BOT_TOKEN}}"
DATABASE_URL      = "${{Postgres.DATABASE_URL}}"
REDIS_URL         = "${{Redis.REDIS_URL}}"
ANTHROPIC_API_KEY = "${{ANTHROPIC_API_KEY}}"
GEMINI_API_KEY    = "${{GEMINI_API_KEY}}"
ADMIN_IDS         = "${{ADMIN_IDS}}"
GEMINI_MODEL      = "gemini-2.5-flash-lite"
DB_MIN            = "2"
DB_MAX            = "10"
DROP_PENDING      = "true"
PYTHONPATH        = "/app"

[[services]]
name = "savdoai-worker"
[services.build]
dockerfilePath = "services/worker/Dockerfile"
[services.deploy]
startCommand = "python -m celery -A tasks worker --loglevel=info --concurrency=2"
restartPolicyType = "ON_FAILURE"
[services.variables]
DATABASE_URL = "${{Postgres.DATABASE_URL}}"
REDIS_URL    = "${{Redis.REDIS_URL}}"
BOT_TOKEN    = "${{BOT_TOKEN}}"
DB_MIN       = "1"
DB_MAX       = "5"
PYTHONPATH   = "/app"

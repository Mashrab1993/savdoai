# SAVDOAI v25.3 — Railway Config
# 5 servis: API + Bot + Web + Postgres + Redis
#
# Service names below must match Railway project service names for ${{...}} interpolation.
# IaC: savdoai=API, savdoai-bot=bot, savdoai-web=Next.js. Live drift (documented): web=API, savdoai=bot, savdoai-web=Next.js — see docs/RAILWAY_TOPOLOGY.md
# If live API is named "web", NEXT_PUBLIC_API_URL must use the web service URL — not ${{savdoai.URL}} unless API is actually named savdoai.

[build]
builder = "NIXPACKS"

[[services]]
name = "savdoai"
[services.build]
dockerfilePath = "services/api/Dockerfile"
[services.deploy]
startCommand = "python -m uvicorn services.api.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1"
# Lightweight probe (no DB) — avoids edge marking the service unhealthy if /health is slow
# PRINT_SECRET: same value on API + bot (print HMAC). IAC names this API block "savdoai"; if the dashboard names the API "web", set PRINT_SECRET on that API service too — see docs/RAILWAY_TOPOLOGY.md
healthCheckPath = "/healthz"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
[services.variables]
DATABASE_URL      = "${{Postgres.DATABASE_URL}}"
REDIS_URL         = "${{Redis.REDIS_URL}}"
JWT_SECRET        = "${{JWT_SECRET}}"
PRINT_SECRET      = "${{PRINT_SECRET}}"
BOT_TOKEN         = "${{BOT_TOKEN}}"
WEB_URL           = "https://savdoai-web-production.up.railway.app"
DB_MIN            = "2"
DB_MAX            = "10"
PYTHONPATH        = "/app"
# AI brigada (shared — set once at Railway Project → Variables level)
ANTHROPIC_API_KEY = "${{ANTHROPIC_API_KEY}}"
GEMINI_API_KEY    = "${{GEMINI_API_KEY}}"
OPENAI_API_KEY    = "${{OPENAI_API_KEY}}"
OPENAI_MODEL      = "gpt-5.4"

[[services]]
name = "savdoai-bot"
[services.build]
dockerfilePath = "services/bot/Dockerfile"
[services.deploy]
startCommand = "python -m services.bot.main"
# Polling bot should run as a single consumer per BOT_TOKEN.
# If live conflict "terminated by other getUpdates" appears, verify only one Railway service/replica is running this token.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
[services.variables]
BOT_TOKEN         = "${{BOT_TOKEN}}"
DATABASE_URL      = "${{Postgres.DATABASE_URL}}"
REDIS_URL         = "${{Redis.REDIS_URL}}"
ANTHROPIC_API_KEY = "${{ANTHROPIC_API_KEY}}"
GEMINI_API_KEY    = "${{GEMINI_API_KEY}}"
OPENAI_API_KEY    = "${{OPENAI_API_KEY}}"
OPENAI_MODEL      = "gpt-5.4"
ADMIN_IDS         = "${{ADMIN_IDS}}"
JWT_SECRET        = "${{JWT_SECRET}}"
PRINT_SECRET      = "${{PRINT_SECRET}}"
WEB_URL           = "https://savdoai-web-production.up.railway.app"
GEMINI_MODEL      = "gemini-2.5-pro"
DB_MIN            = "2"
DB_MAX            = "10"
DROP_PENDING      = "true"
PYTHONPATH        = "/app"

[[services]]
name = "savdoai-web"
rootDirectory = "services/web"
[services.build]
dockerfilePath = "Dockerfile"
[services.deploy]
healthCheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
[services.variables]
# IMPORTANT: Live Railway service names differ from IaC:
#   "web" = FastAPI API, "savdoai" = bot, "savdoai-web" = Next.js
# NEXT_PUBLIC_API_URL must point to FastAPI ("web"), not bot ("savdoai").
NEXT_PUBLIC_API_URL = "${{web.URL}}"
PORT                = "3000"

# SAVDOAI v25.3 — Railway Config
# 5 servis: API + Bot + Web + Postgres + Redis

[build]
builder = "NIXPACKS"

[[services]]
name = "savdoai-api"
[services.build]
dockerfilePath = "services/api/Dockerfile"
[services.deploy]
startCommand = "cd /app/services/api && python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1"
healthCheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
[services.variables]
DATABASE_URL  = "${{Postgres.DATABASE_URL}}"
REDIS_URL     = "${{Redis.REDIS_URL}}"
JWT_SECRET    = "${{JWT_SECRET}}"
DB_MIN        = "2"
DB_MAX        = "10"
PYTHONPATH    = "/app"

[[services]]
name = "savdoai-bot"
[services.build]
dockerfilePath = "services/bot/Dockerfile"
[services.deploy]
startCommand = "cd /app/services/bot && python main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
[services.variables]
BOT_TOKEN         = "${{BOT_TOKEN}}"
DATABASE_URL      = "${{Postgres.DATABASE_URL}}"
REDIS_URL         = "${{Redis.REDIS_URL}}"
ANTHROPIC_API_KEY = "${{ANTHROPIC_API_KEY}}"
GEMINI_API_KEY    = "${{GEMINI_API_KEY}}"
ADMIN_IDS         = "${{ADMIN_IDS}}"
JWT_SECRET        = "${{JWT_SECRET}}"
GEMINI_MODEL      = "gemini-2.5-pro"
DB_MIN            = "2"
DB_MAX            = "10"
DROP_PENDING      = "true"
PYTHONPATH        = "/app"

[[services]]
name = "savdoai-web"
rootDirectory = "services/web"
[services.build]
dockerfilePath = "Dockerfile"
[services.deploy]
healthCheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
[services.variables]
NEXT_PUBLIC_API_URL = "${{savdoai-api.URL}}"
PORT                = "3000"

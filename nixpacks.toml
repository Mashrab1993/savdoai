# Nixpacks — Railway build. Nix Python pip keltirmaydi, shuning uchun setup da pip qo'shamiz.
[phases.setup]
nixPkgs = ["...", "python312Packages.pip"]

[phases.install]
cmds = ["python -m pip install --no-cache-dir -r requirements.txt"]

[start]
cmd = "PYTHONPATH=/app python -m uvicorn services.api.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1"

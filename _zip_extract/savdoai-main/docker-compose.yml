# ═══════════════════════════════════════════════════════════
#  SavdoAI v25.3.2 — Docker Compose (Local Development)
#  docker-compose up -d
# ═══════════════════════════════════════════════════════════

version: "3.8"

services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: savdoai
      POSTGRES_USER: savdoai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-savdoai_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savdoai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s

  # ── API Server ──
  api:
    build: .
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      DATABASE_URL: postgresql://savdoai:${DB_PASSWORD:-savdoai_dev}@db:5432/savdoai
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      BOT_TOKEN: ${BOT_TOKEN}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: ${PORT:-8000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Telegram Bot ──
  bot:
    build: .
    command: python -m services.bot.main
    environment:
      DATABASE_URL: postgresql://savdoai:${DB_PASSWORD:-savdoai_dev}@db:5432/savdoai
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      API_URL: http://api:${PORT:-8000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:

# SAVDOAI v25.3 — Railway Config
# 5 servis: API + Bot + Web + Postgres + Redis
#
# IaC: savdoai=API, savdoai-bot=bot, savdoai-web=Next.js. Keep in sync with root railway.toml.
# Live drift (documented): web=API, savdoai=bot, savdoai-web=Next.js — docs/RAILWAY_TOPOLOGY.md
# API healthcheck: /healthz. If live API is "web", NEXT_PUBLIC_API_URL must target web — see docs.

[build]
builder = "NIXPACKS"

[[services]]
name = "savdoai"
[services.build]
dockerfilePath = "services/api/Dockerfile"
[services.deploy]
startCommand = "cd /app/services/api && python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1"
healthCheckPath = "/healthz"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
[services.variables]
DATABASE_URL  = "${{Postgres.DATABASE_URL}}"
REDIS_URL     = "${{Redis.REDIS_URL}}"
JWT_SECRET    = "${{JWT_SECRET}}"
WEB_URL       = "https://savdoai-web-production.up.railway.app"
DB_MIN        = "2"
DB_MAX        = "10"
PYTHONPATH    = "/app"

[[services]]
name = "savdoai-bot"
[services.build]
dockerfilePath = "services/bot/Dockerfile"
[services.deploy]
startCommand = "cd /app/services/bot && python main.py"
# Polling bot should run as a single consumer per BOT_TOKEN.
# If live conflict "terminated by other getUpdates" appears, verify only one Railway service/replica is running this token.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
[services.variables]
BOT_TOKEN         = "${{BOT_TOKEN}}"
DATABASE_URL      = "${{Postgres.DATABASE_URL}}"
REDIS_URL         = "${{Redis.REDIS_URL}}"
ANTHROPIC_API_KEY = "${{ANTHROPIC_API_KEY}}"
GEMINI_API_KEY    = "${{GEMINI_API_KEY}}"
ADMIN_IDS         = "${{ADMIN_IDS}}"
WEB_URL           = "https://savdoai-web-production.up.railway.app"
GEMINI_MODEL      = "gemini-2.5-pro"
DB_MIN            = "2"
DB_MAX            = "10"
DROP_PENDING      = "true"
PYTHONPATH        = "/app"

[[services]]
name = "savdoai-web"
rootDirectory = "services/web"
[services.build]
dockerfilePath = "Dockerfile"
[services.deploy]
healthCheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
[services.variables]
# Bakes into the Next.js client bundle at build time. Must be the FastAPI service — here `savdoai` is the API per this file. If your dashboard names the API `web` instead, set this manually to ${{web.URL}} or the API HTTPS origin (never the bot hostname).
NEXT_PUBLIC_API_URL = "${{savdoai.URL}}"
PORT                = "3000"

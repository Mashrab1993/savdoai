# Mashrab Moliya v21.5 — Lokal infratuzilma (PostgreSQL + Redis)
# Ishga tushirish: docker-compose up -d
# To'xtatish: docker-compose down

version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: mashrab_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mashrab
    ports:
      - "5432:5432"
    volumes:
      - mashrab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mashrab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mashrab_redis
    ports:
      - "6379:6379"
    volumes:
      - mashrab_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mashrab_pgdata:
  mashrab_redisdata:

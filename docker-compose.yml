# Mashrab Moliya v22.1 — Lokal (PostgreSQL + Redis + API + Bot + Worker)
# Ishga tushirish: docker-compose up -d
# To'xtatish: docker-compose down

version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: mashrab_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mashrab
    ports:
      - "5432:5432"
    volumes:
      - mashrab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mashrab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mashrab_redis
    ports:
      - "6379:6379"
    volumes:
      - mashrab_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: mashrab_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mashrab
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: services/bot/Dockerfile
    container_name: mashrab_bot
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mashrab
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: mashrab_worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mashrab
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

volumes:
  mashrab_pgdata:
  mashrab_redisdata:
